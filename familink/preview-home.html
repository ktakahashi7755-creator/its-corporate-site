<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ふぁみりんく - ホーム画面プレビュー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f0e8e4;font-family:-apple-system,'Hiragino Sans','Noto Sans JP',sans-serif;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:32px 16px}
.frame{width:390px;background:#fff;border-radius:48px;box-shadow:0 24px 80px rgba(0,0,0,.22);overflow:hidden;position:relative;border:10px solid #1a1a1a}
.notch{background:#1a1a1a;height:32px;border-radius:0 0 20px 20px;width:120px;margin:0 auto;position:relative;z-index:10}
.screen{background:#fff8f5;height:780px;overflow-y:auto;scrollbar-width:none}
.screen::-webkit-scrollbar{display:none}

/* colors */
:root{
  --primary:#FF6B9D;--plight:#FFB3CE;--pdark:#E05580;
  --secondary:#4ECDC4;--accent:#FFE66D;
  --bg:#FFF8F5;--surface:#FFFFFF;--alt:#F9F4F1;
  --text:#2D2D2D;--sub:#7A7A7A;--muted:#ADADAD;
  --border:#EEE8E5;--success:#6BCB77;--error:#FF6B6B;--info:#4D96FF;
  --warn:#FFD93D;
}

/* Header */
.header{padding:16px 16px 8px;background:var(--bg)}
.header-row{display:flex;justify-content:space-between;align-items:center}
.greet{font-size:12px;color:var(--sub)}
.name{font-size:20px;font-weight:800;color:var(--text);margin-top:2px}
.scan-btn{display:flex;align-items:center;gap:5px;background:var(--primary);color:#fff;border:none;border-radius:99px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer}
.family-label{font-size:11px;color:var(--sub);margin-top:4px}

/* Section */
.section{padding:0 16px 8px}
.sec-title{font-size:16px;font-weight:800;color:var(--text);margin:12px 0 8px}
.sec-row{display:flex;justify-content:space-between;align-items:center;margin:12px 0 8px}
.see-all{font-size:12px;color:var(--primary);font-weight:700}

/* Child cards */
.child-scroll{display:flex;gap:10px;overflow-x:auto;padding:0 16px 4px;scrollbar-width:none}
.child-scroll::-webkit-scrollbar{display:none}
.child-card{flex:0 0 100px;background:#fff;border-radius:16px;padding:12px 8px;text-align:center;border:2px solid;box-shadow:0 2px 8px rgba(0,0,0,.06);cursor:pointer;transition:.15s}
.child-card:active{transform:scale(.97)}
.avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff;margin:0 auto 6px}
.child-name{font-size:14px;font-weight:700;color:var(--text)}
.child-age{font-size:11px;color:var(--sub);margin:2px 0}
.child-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;margin-top:3px}
.add-child-mini{flex:0 0 72px;background:var(--alt);border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;font-size:11px;color:var(--sub);font-weight:600;min-height:112px}

/* Tomorrow card */
.card{background:#fff;border-radius:16px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.07);margin-bottom:10px;cursor:pointer}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.card-title-row{display:flex;align-items:center;gap:6px}
.card-title{font-size:16px;font-weight:800;color:var(--text)}
.chevron{color:var(--sub);font-size:16px}
.progress-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.progress-bg{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;background:var(--success);transition:.4s}
.progress-label{font-size:12px;color:var(--sub);white-space:nowrap}
.check-row{display:flex;align-items:center;gap:8px;padding:4px 0;cursor:pointer}
.check-icon{font-size:20px;transition:.2s}
.check-label{font-size:14px;color:var(--text);transition:.2s}
.check-label.done{text-decoration:line-through;color:var(--muted)}
.more-text{font-size:12px;color:var(--primary);margin-top:4px;font-weight:600}

/* Event cards */
.event-card{background:#fff;border-radius:16px;padding:12px 14px;box-shadow:0 2px 8px rgba(0,0,0,.07);margin-bottom:8px;display:flex;align-items:center;gap:10px}
.event-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.event-body{flex:1}
.event-title{font-size:14px;font-weight:700;color:var(--text)}
.event-date{font-size:12px;color:var(--sub);margin-top:2px}
.badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;white-space:nowrap}

/* Quick actions */
.quick-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px}
.quick-card{background:#fff;border-radius:16px;padding:14px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.06);cursor:pointer;transition:.15s}
.quick-card:active{transform:scale(.97)}
.quick-icon{width:52px;height:52px;border-radius:26px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 8px}
.quick-label{font-size:13px;font-weight:700;color:var(--text)}

/* Members */
.members-card{background:#fff;border-radius:16px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.members-row{display:flex;gap:16px;flex-wrap:wrap}
.member-item{display:flex;flex-direction:column;align-items:center;gap:4px}
.member-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff}
.member-name{font-size:11px;color:var(--sub)}

/* Tab bar */
.tabbar{background:#fff;border-top:1px solid var(--border);display:flex;height:72px;padding:0 4px 8px;position:sticky;bottom:0}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;font-size:10px;font-weight:700;color:var(--muted);transition:.15s;border:none;background:none}
.tab.active{color:var(--primary)}
.tab-icon{font-size:22px}
.tab-dot{width:6px;height:6px;border-radius:50%;background:var(--primary);display:none}
.tab.active .tab-dot{display:block}

/* Toast */
.toast{position:fixed;bottom:110px;left:50%;transform:translateX(-50%) translateY(20px);background:#333;color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Bottom space */
.bottom-space{height:24px}
</style>
</head>
<body>

<div class="frame">
  <div class="notch"></div>
  <div class="screen" id="screen">

    <!-- Header -->
    <div class="header">
      <div class="header-row">
        <div>
          <div class="greet">こんにちは、</div>
          <div class="name">ひろみさん ✨</div>
        </div>
        <button class="scan-btn" onclick="toast('プリント読取画面へ')">📷 プリント読取</button>
      </div>
      <div class="family-label">🏠 山田家</div>
    </div>

    <!-- Children -->
    <div class="sec-title" style="padding:0 16px">お子さん</div>
    <div class="child-scroll">
      <div class="child-card" style="border-color:#FF6B9D" onclick="toast('はなこの詳細へ')">
        <div class="avatar" style="background:#FF6B9D">は</div>
        <div class="child-name">はなこ</div>
        <div class="child-age">5歳</div>
        <span class="child-badge" style="background:#FF6B9D30;color:#FF6B9D">さくら保育園</span>
      </div>
      <div class="child-card" style="border-color:#4ECDC4" onclick="toast('たろうの詳細へ')">
        <div class="avatar" style="background:#4ECDC4">た</div>
        <div class="child-name">たろう</div>
        <div class="child-age">3歳</div>
        <span class="child-badge" style="background:#4ECDC430;color:#3AB0A8">さくら保育園</span>
      </div>
      <div class="add-child-mini" onclick="toast('お子さんを追加')">＋<span>追加</span></div>
    </div>

    <!-- Tomorrow -->
    <div class="section">
      <div class="card" onclick="toggleTomorrow()">
        <div class="card-header">
          <div class="card-title-row">
            <span>🌙</span>
            <span class="card-title">明日の準備</span>
          </div>
          <span class="chevron">›</span>
        </div>
        <div class="progress-row">
          <div class="progress-bg"><div class="progress-fill" id="prog" style="width:60%"></div></div>
          <span class="progress-label" id="prog-label">3/5 完了</span>
        </div>
        <div id="checklist">
          <div class="check-row" onclick="toggleCheck(event,this)">
            <span class="check-icon">✅</span><span class="check-label done">お弁当（はなこ）</span>
          </div>
          <div class="check-row" onclick="toggleCheck(event,this)">
            <span class="check-icon">✅</span><span class="check-label done">水筒（はなこ）</span>
          </div>
          <div class="check-row" onclick="toggleCheck(event,this)">
            <span class="check-icon">✅</span><span class="check-label done">お着替え（たろう）</span>
          </div>
          <div class="check-row" onclick="toggleCheck(event,this)">
            <span class="check-icon">⭕</span><span class="check-label">体操服（はなこ）</span>
          </div>
          <div class="check-row" onclick="toggleCheck(event,this)">
            <span class="check-icon">⭕</span><span class="check-label">連絡帳（たろう）</span>
          </div>
        </div>
      </div>

      <!-- Events -->
      <div class="sec-row">
        <span class="sec-title" style="margin:0">今週のイベント</span>
        <span class="see-all" onclick="toast('カレンダーへ')">すべて見る</span>
      </div>

      <div class="event-card">
        <div class="event-dot" style="background:#FF6B9D"></div>
        <div class="event-body">
          <div class="event-title">保育参観（はなこ）</div>
          <div class="event-date">4月22日（火）10:00〜11:30</div>
        </div>
        <span class="badge" style="background:#FFCECE;color:#FF6B6B">明日</span>
      </div>
      <div class="event-card">
        <div class="event-dot" style="background:#4ECDC4"></div>
        <div class="event-body">
          <div class="event-title">内科健診（たろう）</div>
          <div class="event-date">4月24日（木）</div>
        </div>
        <span class="badge" style="background:#C2D9FF;color:#4D96FF">3日後</span>
      </div>
      <div class="event-card">
        <div class="event-dot" style="background:#FFE66D"></div>
        <div class="event-body">
          <div class="event-title">春の遠足（はなこ）</div>
          <div class="event-date">4月26日（土）</div>
        </div>
        <span class="badge" style="background:#C2D9FF;color:#4D96FF">5日後</span>
      </div>

      <!-- Quick actions -->
      <div class="sec-title">クイックアクション</div>
      <div class="quick-grid">
        <div class="quick-card" onclick="toast('体調記録へ')">
          <div class="quick-icon" style="background:#FFECEC">🌡️</div>
          <div class="quick-label">体調記録</div>
        </div>
        <div class="quick-card" onclick="toast('明日の準備へ')">
          <div class="quick-icon" style="background:#FFF0F5">🌙</div>
          <div class="quick-label">明日の準備</div>
        </div>
        <div class="quick-card" onclick="toast('プリント読取へ')">
          <div class="quick-icon" style="background:#F0FFFE">📷</div>
          <div class="quick-label">プリント</div>
        </div>
        <div class="quick-card" onclick="toast('共有ボードへ')">
          <div class="quick-icon" style="background:#F3F0FF">👨‍👩‍👧</div>
          <div class="quick-label">共有ボード</div>
        </div>
      </div>

      <!-- Members -->
      <div class="sec-title">家族メンバー</div>
      <div class="members-card">
        <div class="members-row">
          <div class="member-item">
            <div class="member-av" style="background:#FF6B9D">ひ</div>
            <div class="member-name">ひろみ</div>
          </div>
          <div class="member-item">
            <div class="member-av" style="background:#4ECDC4">け</div>
            <div class="member-name">けんじ</div>
          </div>
          <div class="member-item">
            <div class="member-av" style="background:#FFE66D">は</div>
            <div class="member-name">はなこ</div>
          </div>
          <div class="member-item">
            <div class="member-av" style="background:#A8E6CF">た</div>
            <div class="member-name">たろう</div>
          </div>
        </div>
      </div>

      <div class="bottom-space"></div>
    </div>
  </div><!-- /screen content -->

  <!-- Tab bar -->
  <div class="tabbar">
    <button class="tab active">
      <span class="tab-icon">🏠</span>
      <span>ホーム</span>
      <div class="tab-dot"></div>
    </button>
    <button class="tab" onclick="toast('カレンダー')">
      <span class="tab-icon">📅</span>
      <span>カレンダー</span>
    </button>
    <button class="tab" onclick="toast('共有ボード')">
      <span class="tab-icon">👨‍👩‍👧</span>
      <span>共有ボード</span>
    </button>
    <button class="tab" onclick="toast('通知')">
      <span class="tab-icon">🔔</span>
      <span>通知</span>
    </button>
    <button class="tab" onclick="toast('設定')">
      <span class="tab-icon">⚙️</span>
      <span>設定</span>
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let checked = 3, total = 5;

function updateProgress() {
  document.getElementById('prog').style.width = (checked/total*100)+'%';
  document.getElementById('prog-label').textContent = checked+'/'+total+' 完了';
}

function toggleCheck(e, row) {
  e.stopPropagation();
  const icon = row.querySelector('.check-icon');
  const label = row.querySelector('.check-label');
  if (label.classList.contains('done')) {
    label.classList.remove('done');
    icon.textContent = '⭕';
    checked--;
  } else {
    label.classList.add('done');
    icon.textContent = '✅';
    checked++;
    if (checked === total) {
      setTimeout(()=>toast('🎉 準備完了！おつかれさまでした'), 200);
    }
  }
  updateProgress();
}

function toggleTomorrow() { toast('明日の準備画面へ'); }

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 1800);
}
</script>
</body>
</html>
