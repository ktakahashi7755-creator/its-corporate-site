<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="sv" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#b8cad8"/>
      <stop offset="48%" stop-color="#eef6ff"/>
      <stop offset="100%" stop-color="#7a94a8"/>
    </linearGradient>
    <linearGradient id="gd" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#8a6c28"/>
      <stop offset="48%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#e8d070"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <circle cx="60" cy="60" r="58" fill="#0a1628"/>
  <circle cx="60" cy="60" r="57" fill="none" stroke="url(#gd)" stroke-width="0.8" opacity="0.45"/>
  <!-- I — left vertical -->
  <rect x="24" y="22" width="10" height="76" rx="2" fill="url(#sv)"/>
  <!-- T — crossbar (shared top) -->
  <rect x="24" y="22" width="60" height="10" rx="2" fill="url(#sv)"/>
  <!-- T — right vertical -->
  <rect x="74" y="22" width="10" height="76" rx="2" fill="url(#sv)"/>
  <!-- S — gold overlay -->
  <text x="38" y="88"
        font-family="Georgia,'Times New Roman',serif"
        font-size="62" font-weight="700" font-style="italic"
        fill="url(#gd)" opacity="0.92">S</text>
</svg>
